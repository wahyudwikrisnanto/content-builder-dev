<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F5F4;
      --bg-panel: #FFFFFF;
      --bg-hover: #F7F7F6;
      --bg-active: #EEEEEC;
      --text-1: #1A1A1A;
      --text-2: #6B6B6B;
      --text-3: #A3A3A3;
      --border: #E5E5E3;
      --border-subtle: #F0F0EE;
      --accent: #1A1A1A;
      --selection: #2563EB;
      --selection-light: rgba(37,99,235,0.07);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.08);
      --r-sm: 6px;
      --r: 8px;
      --r-lg: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; overflow: hidden; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-1);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── App layout ── */
    .app { display: flex; flex-direction: column; height: 100vh; }
    .main-area { display: flex; flex: 1; overflow: hidden; }

    /* ── Toolbar ── */
    .toolbar {
      height: 50px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      flex-shrink: 0;
      z-index: 100;
    }
    .toolbar-brand {
      display: flex; align-items: center; gap: 7px;
      font-size: 14px; font-weight: 700; color: var(--text-1);
      padding: 0 8px 0 4px;
      letter-spacing: -0.01em;
    }
    .toolbar-divider { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .toolbar-group { display: flex; align-items: center; gap: 2px; }
    .toolbar-spacer { flex: 1; }
    .zoom-label { font-size: 12px; color: var(--text-2); min-width: 42px; text-align: center; font-variant-numeric: tabular-nums; }

    /* ── Icon buttons ── */
    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border: none; background: none;
      border-radius: var(--r-sm); color: var(--text-2); cursor: pointer;
      transition: all 0.12s;
    }
    .icon-btn:hover { background: var(--bg-hover); color: var(--text-1); }
    .icon-btn:disabled { opacity: 0.25; cursor: default; }
    .icon-btn:disabled:hover { background: none; }

    .icon-btn-sm {
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border: none; background: none;
      border-radius: 4px; color: var(--text-3); cursor: pointer; transition: all 0.12s;
    }
    .icon-btn-sm:hover { background: var(--bg-hover); color: var(--text-1); }

    /* ── Canvas size selector ── */
    .canvas-size-selector { position: relative; }
    .canvas-size-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border: 1px solid var(--border);
      border-radius: var(--r-sm); background: var(--bg-panel);
      font-size: 12px; color: var(--text-2); cursor: pointer;
      font-family: inherit; transition: border-color 0.12s;
      font-variant-numeric: tabular-nums;
    }
    .canvas-size-btn:hover { border-color: var(--text-3); }
    .canvas-size-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0;
      background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--shadow-lg);
      z-index: 1000; min-width: 210px; padding: 4px;
    }
    .dropdown-label {
      padding: 8px 12px 4px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-3);
    }
    .canvas-size-option {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px; border-radius: var(--r-sm); cursor: pointer;
      font-size: 13px; border: none; background: none; width: 100%;
      text-align: left; font-family: inherit; color: var(--text-1); transition: background 0.1s;
    }
    .canvas-size-option:hover { background: var(--bg-hover); }
    .canvas-size-option .dims { color: var(--text-3); font-size: 11px; font-variant-numeric: tabular-nums; }

    /* ── Sidebar ── */
    .sidebar {
      width: 264px; background: var(--bg-panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-tabs {
      display: flex; border-bottom: 1px solid var(--border); padding: 0 4px;
    }
    .sidebar-tab {
      display: flex; align-items: center; gap: 5px;
      padding: 11px 10px; border: none; background: none;
      font-size: 12.5px; font-weight: 500; color: var(--text-3);
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.12s; font-family: inherit;
    }
    .sidebar-tab.active { color: var(--text-1); border-bottom-color: var(--accent); }
    .sidebar-tab:hover { color: var(--text-1); }
    .sidebar-content { flex: 1; overflow-y: auto; padding: 14px; }

    /* ── Element items ── */
    .element-section { margin-bottom: 18px; }
    .element-section-title {
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-3); margin-bottom: 8px;
    }
    .element-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .element-grid.three-col { grid-template-columns: 1fr 1fr 1fr; }
    .element-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 6px; padding: 14px 8px 10px; border-radius: var(--r);
      border: 1px solid var(--border); background: var(--bg-panel);
      cursor: grab; transition: all 0.12s; min-height: 64px;
    }
    .element-item:hover { border-color: var(--text-3); background: var(--bg-hover); }
    .element-item:active { cursor: grabbing; transform: scale(0.97); }
    .element-item-icon { color: var(--text-2); }
    .element-item-label { font-size: 11px; color: var(--text-2); font-weight: 500; }

    /* ── Layers ── */
    .layers-list { display: flex; flex-direction: column; gap: 2px; }
    .layer-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: var(--r-sm);
      cursor: pointer; transition: all 0.1s; font-size: 12.5px;
    }
    .layer-item:hover { background: var(--bg-hover); }
    .layer-item.active { background: var(--selection-light); }
    .layer-item-icon { color: var(--text-3); flex-shrink: 0; display: flex; }
    .layer-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-item-actions { display: flex; gap: 1px; opacity: 0; transition: opacity 0.12s; }
    .layer-item:hover .layer-item-actions,
    .layer-item.active .layer-item-actions { opacity: 1; }

    /* ── Text styles cards ── */
    .text-style-card {
      display: flex; flex-direction: column; gap: 3px;
      padding: 12px 14px; border-radius: var(--r);
      border: 1px solid var(--border); margin-bottom: 6px;
      cursor: pointer; transition: all 0.12s;
    }
    .text-style-card:hover { border-color: var(--text-3); background: var(--bg-hover); }
    .text-style-desc { font-size: 11px; color: var(--text-3); }

    /* ── Empty panel ── */
    .empty-panel {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 20px; gap: 6px;
      text-align: center; color: var(--text-3); font-size: 13px;
    }
    .empty-sub { font-size: 11.5px; opacity: 0.7; }

    /* ── Workspace ── */
    .workspace {
      flex: 1; overflow: hidden; display: flex; flex-direction: column;
      background: var(--bg); position: relative;
    }
    .canvas-scroll {
      flex: 1; overflow: auto; display: flex; justify-content: center;
      padding: 40px 40px 80px;
    }
    .canvas-wrapper { position: relative; flex-shrink: 0; }
    .canvas {
      background: white; box-shadow: var(--shadow-lg); position: relative;
      border-radius: 2px;
    }
    .canvas.drag-over { outline: 2px dashed var(--selection); outline-offset: -2px; }

    .canvas-empty {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; color: var(--text-3);
      font-size: 13px; text-align: center; line-height: 1.5;
      pointer-events: none;
    }

    /* ── Canvas elements ── */
    .canvas-el {
      position: absolute; cursor: move; transition: box-shadow 0.08s;
    }
    .canvas-el:hover:not(.selected):not(.locked) {
      outline: 1.5px solid var(--selection); outline-offset: 0;
    }
    .canvas-el.selected {
      outline: 2px solid var(--selection); outline-offset: 0;
    }
    .canvas-el.editing {
      outline: 2px solid var(--selection); cursor: text;
    }
    .canvas-el.locked { cursor: default; }

    /* ── Resize handles ── */
    .resize-handle {
      position: absolute; width: 10px; height: 10px;
      background: #fff; border: 2px solid var(--selection);
      border-radius: 2px; z-index: 10;
    }

    /* ── Image / video placeholders ── */
    .img-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; width: 100%; height: 100%;
      background: #FAFAF9; border: 1.5px dashed var(--border);
      border-radius: inherit; color: var(--text-3); gap: 6px;
      font-size: 12px; cursor: pointer;
    }
    .img-placeholder:hover { border-color: var(--text-3); background: var(--bg-hover); }
    .vid-placeholder {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; width: 100%; height: 100%;
      background: #18181B; border-radius: inherit;
      color: rgba(255,255,255,0.4); gap: 6px; font-size: 12px;
    }

    /* ── Properties panel ── */
    .properties {
      width: 264px; background: var(--bg-panel); border-left: 1px solid var(--border);
      flex-shrink: 0; overflow-y: auto;
    }
    .properties-header {
      display: flex; align-items: center; padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px; font-weight: 600;
    }
    .prop-section { padding: 14px; border-bottom: 1px solid var(--border-subtle); }
    .prop-section-title {
      font-size: 10.5px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-3); margin-bottom: 10px;
    }
    .prop-row {
      display: flex; align-items: center; gap: 6px; margin-bottom: 7px;
    }
    .prop-row:last-child { margin-bottom: 0; }
    .prop-row-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 7px; }
    .prop-row-pair:last-child { margin-bottom: 0; }
    .prop-row-pair .prop-row { margin-bottom: 0; min-width: 0; }
    .prop-label {
      font-size: 11.5px; color: var(--text-2); width: 44px; flex-shrink: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .prop-row-pair .prop-label { width: 20px; }
    .prop-input {
      flex: 1; height: 30px; padding: 0 6px;
      border: 1px solid var(--border); border-radius: var(--r-sm);
      font-size: 12px; font-family: inherit; color: var(--text-1);
      background: var(--bg-panel); outline: none; transition: border-color 0.12s;
      min-width: 0;
    }
    .prop-input::-webkit-outer-spin-button,
    .prop-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .prop-input[type="number"] { -moz-appearance: textfield; }
    .prop-input:focus { border-color: var(--selection); }
    .prop-select {
      flex: 1; height: 30px; padding: 0 6px;
      border: 1px solid var(--border); border-radius: var(--r-sm);
      font-size: 12px; font-family: inherit; color: var(--text-1);
      background: var(--bg-panel); outline: none; cursor: pointer; min-width: 0;
    }
    .prop-select:focus { border-color: var(--selection); }
    .prop-hint {
      padding: 24px 14px; color: var(--text-3); font-size: 12px; text-align: center;
    }

    /* ── Color input ── */
    .color-input-wrap {
      display: flex; align-items: center; gap: 6px; flex: 1;
      height: 30px; padding: 0 6px 0 4px;
      border: 1px solid var(--border); border-radius: var(--r-sm);
    }
    .color-swatch {
      width: 20px; height: 20px; border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.08); cursor: pointer;
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .color-swatch input[type="color"] {
      position: absolute; inset: -6px; width: 32px; height: 32px;
      border: none; cursor: pointer; opacity: 0;
    }
    .color-hex-input {
      font-size: 11.5px; color: var(--text-1); border: none; outline: none;
      width: 58px; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      background: transparent;
    }

    /* ── Toggle group ── */
    .toggle-group {
      display: flex; border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden;
    }
    .toggle-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 28px; border: none;
      background: var(--bg-panel); color: var(--text-3);
      cursor: pointer; border-right: 1px solid var(--border);
      transition: all 0.1s;
    }
    .toggle-btn:last-child { border-right: none; }
    .toggle-btn:hover { background: var(--bg-hover); color: var(--text-1); }
    .toggle-btn.active { background: var(--accent); color: white; }

    /* ── Small buttons ── */
    .btn-sm {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 10px; border-radius: var(--r-sm);
      border: 1px solid var(--border); background: var(--bg-panel);
      font-size: 11.5px; font-weight: 500; font-family: inherit;
      color: var(--text-1); cursor: pointer; transition: all 0.12s;
    }
    .btn-sm:hover { background: var(--bg-hover); }

    /* ── Slider ── */
    .prop-slider {
      flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 2px; outline: none;
    }
    .prop-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
      border: 2px solid white; box-shadow: var(--shadow-sm);
    }
    .opacity-val { font-size: 11px; color: var(--text-2); width: 30px; text-align: right; font-variant-numeric: tabular-nums; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

    /* ── Selection override ── */
    ::selection { background: rgba(37,99,235,0.15); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="cms-core.jsx"></script>
  <script type="text/babel" src="cms-sidebar.jsx"></script>
  <script type="text/babel" src="cms-canvas.jsx"></script>
  <script type="text/babel" src="cms-properties.jsx"></script>
  <script type="text/babel" src="cms-app.jsx"></script>
</body>
</html>
